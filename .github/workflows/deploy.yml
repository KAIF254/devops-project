name: Deploy DevOps Project

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t my-backend ./backend

      - name: Run Container
        run: docker run -d -p 5000:5000 my-backend