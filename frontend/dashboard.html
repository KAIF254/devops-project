<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<style>
body {background:#0f172a; color:white; text-align:center;}
button {padding:10px; margin:10px;}
</style>
</head>

<body>
<canvas id="chart" width="300"></canvas>
<h1>Dashboard</h1>

<p id="user"></p>
<p id="time">Focus Time: 0 sec</p>

<button onclick="addTime()">+10 sec</button>
<button onclick="logout()">Logout</button>

<script>
let canvas = document.getElementById("chart");
let ctx = canvas.getContext("2d");

let t = localStorage.getItem("time") || 0;

ctx.fillStyle = "cyan";
ctx.fillRect(50, 200 - t/10, 50, t/10);
</script>
</body>
</html>
