<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

  <h1>DevOps Monitoring Dashboard</h1>

  <div class="cards">

    <div class="card">
      <h2>CPU Usage</h2>
      <p>45%</p>
    </div>

    <div class="card">
      <h2>RAM Usage</h2>
      <p>60%</p>
    </div>

    <div class="card">
      <h2>Server Status</h2>
      <p>Online ✅</p>
    </div>

  </div>

</div>

</body>
</html>
