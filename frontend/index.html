<!DOCTYPE html>
<html>
<head>
  <title>DevOps Test</title>
</head>
<body>

<h1>Frontend → Backend Test 🚀</h1>

<button onclick="sendData()">Send Data</button>

<p id="result"></p>

<script>
function sendData() {
  const data = { name: "Kaif", time: 120 };

  fetch("https://devops-backend-iigs.onrender.com/data", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(res => {
    alert(res.message);
    console.log(res);
  })
  .catch(err => console.error(err));
}
</script>
</body>
</html>
