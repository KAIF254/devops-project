<!DOCTYPE html>
<html>
<head>
  <title>DevOps Test</title>
</head>
<body>

<h1>Frontend → Backend Test 🚀</h1>

<button onclick="sendData()">Send Data</button>

<p id="result"></p>

<script>
function sendData() {
  fetch("https://devops-backend-iigs.onrender.com/data", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name: "Kaif",
      time: 120
    })
  })
  .then(res => res.json())
  .then(data => {
    alert(data.message);
    console.log(data);
  })
  .catch(err => console.error(err));
}
</script>

</body>
</html>
